<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Longevity Lab</title>
  <meta name="description" content="Shop the full Longevity Lab lineup: supplements, peptides, and protein. Clinical doses, third party tested.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..650;1,9..144,400..650&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="shop">

  <main>
    <div class="container shop-head">
      <h1 id="shopTitle">Shop all</h1>
      <p class="shop-sub" id="shopSub"></p>

      <div class="chip-row" id="chipRow">
        <button class="chip" data-cat="all">All</button>
        <button class="chip" data-cat="supplements">Supplements</button>
        <button class="chip" data-cat="peptides">Peptides</button>
        <button class="chip" data-cat="protein">Protein</button>
        <span class="chip-sep" aria-hidden="true"></span>
        <button class="chip" data-goal="muscle">Muscle</button>
        <button class="chip" data-goal="recovery">Recovery</button>
        <button class="chip" data-goal="sleep">Sleep</button>
        <button class="chip" data-goal="focus">Focus</button>
      </div>

      <div class="product-grid" id="productGrid"></div>
    </div>
  </main>

  <script src="js/products.js"></script>
  <script src="js/store.js"></script>
</body>
</html>
